version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: together-postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - together-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: together-rabbitmq
    restart: always
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - together-network

  redis:
    image: redis:7-alpine
    container_name: together-redis
    restart: always
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "6379:6379"
    networks:
      - together-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: together-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@togetherwifi.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - together-network

volumes:
  postgres_data:

networks:
  together-network: